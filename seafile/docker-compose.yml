version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: seafile-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=ПРИДУМАЙТЕ_ПАРОЛЬ  # Замените
      - MYSQL_ROOT_HOST=%
      - MYSQL_DATABASE=seafile
      - MYSQL_USER=seafile
      - MYSQL_PASSWORD=ПРИДУМАЙТЕ_ПАРОЛЬ  # Замените
    volumes:
      - ./mysql:/var/lib/mysql
    networks:
      - seafile-net

  memcached:
    image: memcached:1.6
    container_name: seafile-memcached
    entrypoint: memcached -m 256
    networks:
      - seafile-net

  seafile:
    image: seafileltd/seafile-mc:latest
    container_name: seafile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./seafile-data:/shared
    environment:
      - DB_HOST=db
      - DB_ROOT_PASSWD=ПРИДУМАЙТЕ_ПАРОЛЬ  # Замените
      - TIME_ZONE=Europe/Moscow
      - SEAFILE_ADMIN_EMAIL=admin@yourcompany.com
      - SEAFILE_ADMIN_PASSWORD=ПРИДУМАЙТЕ_ПАРОЛЬ  # Замените
      - SEAFILE_SERVER_LETSENCRYPT=false
      - SEAFILE_SERVER_HOSTNAME=seafile.yourcompany.com
    depends_on:
      - db
      - memcached
    networks:
      - seafile-net

networks:
  seafile-net:
    driver: bridge
